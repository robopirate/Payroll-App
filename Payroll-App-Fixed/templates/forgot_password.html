{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
          <h4 class="mb-4 text-center"><i class="bi bi-key text-primary"></i> Reset Password</h4>

          {% if error %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}

          {% if success %}
          <div class="alert alert-success alert-dismissible fade show" role="alert">
            {{ success }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}

          <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label">Phone Number <span class="text-danger">*</span></label>
              <input type="tel" name="phone" class="form-control form-control-lg"
                     placeholder="9876543210" pattern="[0-9]{10}" required autofocus>
              <small class="text-muted">Enter your registered 10-digit phone number</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg">
              <i class="bi bi-send"></i> Send Reset Token
            </button>
          </form>

          <div class="mt-4 text-center">
            <p class="text-muted">Remember your password? <a href="{{ url_for('auth.login') }}">Login here</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
