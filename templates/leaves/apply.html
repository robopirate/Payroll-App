{% extends 'base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="{{ url_for('admin.leaves') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
    <h4 class="page-header mb-0">Apply Leave</h4>
  </div>

  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <form method="POST">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Employee <span class="text-danger">*</span></label>
              <select name="employee_id" class="form-select" required>
                <option value="">Select Employee</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}" {% if form.get('employee_id')|int == emp.id %}selected{% endif %}>
                  {{ emp.name }} ({{ emp.emp_id }})
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Leave Type <span class="text-danger">*</span></label>
              <select name="leave_type" class="form-select" required>
                <option value="">Select Type</option>
                <option value="casual" {% if form.get('leave_type') == 'casual' %}selected{% endif %}>Casual Leave</option>
                <option value="sick" {% if form.get('leave_type') == 'sick' %}selected{% endif %}>Sick Leave</option>
                <option value="earned" {% if form.get('leave_type') == 'earned' %}selected{% endif %}>Earned Leave</option>
              </select>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-sm-6">
                <label class="form-label fw-semibold">Start Date <span class="text-danger">*</span></label>
                <input type="date" name="start_date" class="form-control"
                       value="{{ form.get('start_date','') }}" required>
              </div>
              <div class="col-sm-6">
                <label class="form-label fw-semibold">End Date <span class="text-danger">*</span></label>
                <input type="date" name="end_date" class="form-control"
                       value="{{ form.get('end_date','') }}" required>
              </div>
            </div>
            <div class="mb-3 form-check">
              <input type="checkbox" name="half_day" class="form-check-input" id="half_day">
              <label class="form-check-label" for="half_day">Half Day Leave</label>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Reason</label>
              <textarea name="reason" class="form-control" rows="3"
                        placeholder="Reason for leave...">{{ form.get('reason','') }}</textarea>
            </div>
            <div class="d-flex gap-2 justify-content-end">
              <a href="{{ url_for('admin.leaves') }}" class="btn btn-outline-secondary">Cancel</a>
              <button type="submit" class="btn btn-warning">
                <i class="bi bi-send"></i> Submit Application
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
