{% extends 'admin/base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block content %}

<div class="admin-page-header">
  <div>
    <h1 class="admin-page-title">Apply Leave</h1>
    <div class="admin-page-subtitle">
      <a href="{{ url_for('admin.leaves') }}" class="admin-link"><i class="bi bi-arrow-left me-1"></i>Back to Leaves</a>
    </div>
  </div>
</div>

<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="admin-card">
      <div class="admin-card-body">
        <form method="POST">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="admin-form-group">
            <label class="admin-form-label">Employee <span class="text-danger">*</span></label>
            <select name="employee_id" class="admin-form-select" required>
              <option value="">Select Employee</option>
              {% for emp in employees %}
              <option value="{{ emp.id }}" {% if form.get('employee_id')|int == emp.id %}selected{% endif %}>
                {{ emp.name }} ({{ emp.emp_id }})
              </option>
              {% endfor %}
            </select>
          </div>
          <div class="admin-form-group">
            <label class="admin-form-label">Leave Type <span class="text-danger">*</span></label>
            <select name="leave_type" class="admin-form-select" required>
              <option value="">Select Type</option>
              <option value="casual" {% if form.get('leave_type') == 'casual' %}selected{% endif %}>Casual Leave</option>
              <option value="sick" {% if form.get('leave_type') == 'sick' %}selected{% endif %}>Sick Leave</option>
              <option value="earned" {% if form.get('leave_type') == 'earned' %}selected{% endif %}>Earned Leave</option>
            </select>
          </div>
          <div class="row g-3">
            <div class="col-sm-6">
              <div class="admin-form-group">
                <label class="admin-form-label">Start Date <span class="text-danger">*</span></label>
                <input type="date" name="start_date" class="admin-form-control"
                       value="{{ form.get('start_date','') }}" required>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="admin-form-group">
                <label class="admin-form-label">End Date <span class="text-danger">*</span></label>
                <input type="date" name="end_date" class="admin-form-control"
                       value="{{ form.get('end_date','') }}" required>
              </div>
            </div>
          </div>
          <div class="admin-form-group form-check">
            <input type="checkbox" name="half_day" class="form-check-input" id="half_day">
            <label class="form-check-label" for="half_day">Half Day Leave</label>
          </div>
          <div class="admin-form-group">
            <label class="admin-form-label">Reason</label>
            <textarea name="reason" class="admin-form-textarea" rows="3"
                      placeholder="Reason for leave...">{{ form.get('reason','') }}</textarea>
          </div>
          <div class="d-flex gap-2 justify-content-end">
            <a href="{{ url_for('admin.leaves') }}" class="admin-btn admin-btn-secondary">Cancel</a>
            <button type="submit" class="admin-btn admin-btn-warning">
              <i class="bi bi-send"></i> Submit Application
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

{% endblock %}
