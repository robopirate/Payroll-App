{% extends 'portal/base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block head %}
<style>
.back-btn { display: inline-flex; align-items: center; gap: 6px; color: #1565C0; font-weight: 600; font-size: 0.9rem; text-decoration: none; margin-bottom: 16px; transition: color 0.2s; }
.back-btn:hover { color: #FF6B35; }
.form-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 5px; }
.form-control, .form-select { border-radius: 14px; height: 50px; font-size: 1rem; border: 1.5px solid rgba(0,0,0,0.08); background: rgba(255,255,255,0.8); backdrop-filter: blur(4px); }
.form-control:focus, .form-select:focus { border-color: #1565C0; box-shadow: 0 0 0 3px rgba(255,107,53,0.1); background: rgba(255,255,255,0.95); }
textarea.form-control { height: 90px !important; }
.balance-hint { display: inline-block; background: rgba(232,240,254,0.8); backdrop-filter: blur(4px); color: #1565C0; padding: 4px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; margin-top: 6px; border: 1px solid rgba(21,101,192,0.1); }
.submit-btn-glass { background: linear-gradient(135deg, rgba(10,22,40,0.95), rgba(21,101,192,0.9)); color: white; border: none; border-radius: 16px; backdrop-filter: blur(8px); box-shadow: 0 6px 20px rgba(21,101,192,0.2), inset 0 1px 0 rgba(255,255,255,0.1); transition: all 0.25s; height: 50px; font-weight: 600; }
.submit-btn-glass:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(21,101,192,0.3); }
.form-card-glass { background: rgba(255,255,255,0.72); backdrop-filter: blur(16px); border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.5); }
@media (max-width: 400px) {
  .form-card-glass .card-body { padding: 1.2rem !important; }
}
</style>
{% endblock %}
{% block content %}
<a href="{{ url_for('portal.portal_leaves') }}" class="back-btn"><i class="bi bi-arrow-left"></i> Leave Applications</a>
<h5 class="fw-bold mb-3">Apply for Leave</h5>
<div class="form-card-glass"><div class="card-body px-4 py-4" style="background:transparent;">
  <form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="mb-4"><label class="form-label">Leave Type</label><select name="leave_type" class="form-select" required id="leaveTypeSelect" onchange="updateBalance()"><option value="">Select type…</option><option value="casual">Casual Leave</option><option value="sick">Sick Leave</option><option value="earned">Earned Leave</option></select><div id="balanceHint"></div></div>
    <div class="row g-3 mb-4"><div class="col-6"><label class="form-label">From Date</label><input type="date" name="start_date" id="startDate" class="form-control" required onchange="calcDays()"></div><div class="col-6"><label class="form-label">To Date</label><input type="date" name="end_date" id="endDate" class="form-control" required onchange="calcDays()"></div></div>
    <div class="mb-4"><div class="form-check"><input class="form-check-input" type="checkbox" name="half_day" id="halfDay" onchange="calcDays()"><label class="form-check-label" for="halfDay" style="font-size:0.95rem;">Half Day</label></div><div id="daysCalc" class="mt-2" style="font-size:0.85rem;color:#1565C0;font-weight:600;"></div></div>
    <div class="mb-4"><label class="form-label">Reason <span style="font-weight:400;color:#aaa;">(optional)</span></label><textarea name="reason" class="form-control" placeholder="Brief reason for leave…"></textarea></div>
    <button type="submit" class="btn btn-touch w-100 submit-btn-glass"><i class="bi bi-send me-2"></i>Submit Application</button>
  </form>
</div></div>
<div style="height:10px;"></div>
{% endblock %}
{% block scripts %}
<script>const balances = { {% for lb in leave_balances %}'{{ lb.leave_type }}': {{ lb.remaining_days }}, {% endfor %} };
function updateBalance() { const type = document.getElementById('leaveTypeSelect').value, hint = document.getElementById('balanceHint'); if (type && balances[type] !== undefined) hint.innerHTML = `<span class="balance-hint"><i class="bi bi-info-circle"></i> Available: ${balances[type]} day(s)</span>`; else hint.innerHTML = ''; }
function calcDays() { const s = document.getElementById('startDate').value, e = document.getElementById('endDate').value, half = document.getElementById('halfDay').checked, calc = document.getElementById('daysCalc'); if (s && e) { const days = half ? 0.5 : Math.floor((new Date(e) - new Date(s)) / 86400000) + 1; calc.textContent = days >= 1 || half ? `→ ${days} day(s) of leave` : 'End date must be on or after start date'; } }
const today = new Date().toISOString().split('T')[0]; document.getElementById('startDate').min = today; document.getElementById('endDate').min = today; document.getElementById('startDate').addEventListener('change', function() { document.getElementById('endDate').min = this.value; if (document.getElementById('endDate').value < this.value) document.getElementById('endDate').value = this.value; calcDays(); });</script>
{% endblock %}
