{% extends 'portal/base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block content %}

<div class="d-flex align-items-center gap-2 mb-3">
  <a href="{{ url_for('portal.portal_leaves') }}" class="rp-btn rp-btn-ghost" style="padding: 0; width: 38px; height: 38px;"><i class="bi bi-arrow-left"></i></a>
  <h1 class="rp-title-2 mb-0">Apply for Leave</h1>
</div>

<form method="post">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <div class="rp-card mb-3">
    <div class="rp-card-body">
      <div class="rp-form-section-title"><i class="bi bi-calendar2-x"></i> Leave Details</div>

      <div class="mb-3">
        <label class="rp-label">Leave Type</label>
        <select name="leave_type" class="rp-select" required id="leaveTypeSelect" onchange="updateBalance()">
          <option value="">Select type…</option>
          <option value="casual">Casual Leave</option>
          <option value="sick">Sick Leave</option>
          <option value="earned">Earned Leave</option>
        </select>
        <div id="balanceHint"></div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="rp-label">From Date</label>
          <input type="date" name="start_date" id="startDate" class="rp-input" required onchange="calcDays()">
        </div>
        <div class="col-6">
          <label class="rp-label">To Date</label>
          <input type="date" name="end_date" id="endDate" class="rp-input" required onchange="calcDays()">
        </div>
      </div>

      <div class="mb-3">
        <label class="rp-label" style="display:flex;align-items:center;gap:var(--space-2);text-transform:none;letter-spacing:0;">
          <input class="form-check-input" type="checkbox" name="half_day" id="halfDay" onchange="calcDays()" style="width: 20px; height: 20px; margin: 0;">
          <span>Half Day</span>
        </label>
        <div id="daysCalc" class="rp-form-hint mt-2" style="display: none;"></div>
      </div>

      <div class="mb-1">
        <label class="rp-label">Reason <span style="font-weight: 400; color: var(--rp-text-muted);">(optional)</span></label>
        <textarea name="reason" class="rp-input" placeholder="Brief reason for leave…"></textarea>
      </div>
    </div>
  </div>

  <button type="submit" class="rp-btn rp-btn-primary rp-btn-block">
    <i class="bi bi-send"></i> Submit Application
  </button>
</form>

{% endblock %}

{% block scripts %}
<script>
const balances = { {% for lb in leave_balances %}'{{ lb.leave_type }}': {{ lb.remaining_days }}, {% endfor %} };
function updateBalance() {
  const type = document.getElementById('leaveTypeSelect').value;
  const hint = document.getElementById('balanceHint');
  if (type && balances[type] !== undefined) {
    hint.innerHTML = '<span class="rp-form-hint"><i class="bi bi-info-circle"></i> Available: ' + balances[type] + ' day(s)</span>';
  } else {
    hint.innerHTML = '';
  }
}
function calcDays() {
  const s = document.getElementById('startDate').value;
  const e = document.getElementById('endDate').value;
  const half = document.getElementById('halfDay').checked;
  const calc = document.getElementById('daysCalc');
  if (s && e) {
    const days = half ? 0.5 : Math.floor((new Date(e) - new Date(s)) / 86400000) + 1;
    calc.style.display = 'inline-block';
    calc.textContent = (days >= 1 || half) ? '→ ' + days + ' day(s) of leave' : 'End date must be on or after start date';
  } else {
    calc.style.display = 'none';
  }
}
const today = new Date().toISOString().split('T')[0];
document.getElementById('startDate').min = today;
document.getElementById('endDate').min = today;
document.getElementById('startDate').addEventListener('change', function() {
  document.getElementById('endDate').min = this.value;
  if (document.getElementById('endDate').value < this.value) {
    document.getElementById('endDate').value = this.value;
  }
  calcDays();
});
</script>
{% endblock %}
