{% extends 'portal/base.html' %}
{% block title %}My Profile{% endblock %}
{% block head %}
<style>
.profile-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.avatar {
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, #1565C0, #FF6B35);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  font-weight: 800;
  flex-shrink: 0;
}
.profile-meta h5 {
  margin: 0;
  font-weight: 800;
  font-size: 1.1rem;
}
.profile-meta small {
  color: #6c7a8f;
  font-size: 0.78rem;
  font-weight: 500;
}
.form-label {
  font-size: 0.74rem;
  font-weight: 700;
  color: #555;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.form-section-title {
  font-family: 'Poppins', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  margin: 20px 0 12px;
  color: #0A1628;
}
.form-section-title i { color: var(--accent-orange); }
</style>
{% endblock %}
{% block content %}
<div class="profile-header">
  <div class="avatar">{{ emp.name[:1] if emp.name else '?' }}</div>
  <div class="profile-meta">
    <h5>{{ emp.name }}</h5>
    <small>{{ emp.emp_id }} &middot; {{ emp.designation or 'Employee' }}</small>
  </div>
</div>

<form method="POST" action="{{ url_for('portal.portal_profile') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

  <p class="form-section-title"><i class="bi bi-person-lines-fill me-2"></i>Contact Details</p>
  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input type="tel" class="form-control" name="phone" value="{{ emp.phone or '' }}" maxlength="10" inputmode="numeric" pattern="[0-9]{10}" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" name="email" value="{{ emp.email or '' }}">
      </div>
      <div class="mb-1">
        <label class="form-label">Residential Address</label>
        <textarea class="form-control" name="address" rows="3" style="height: auto;">{{ emp.address or '' }}</textarea>
      </div>
    </div>
  </div>

  <p class="form-section-title"><i class="bi bi-bank me-2"></i>Bank Details</p>
  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Bank Name</label>
        <input type="text" class="form-control" name="bank_name" value="{{ emp.bank_name or '' }}">
      </div>
      <div class="mb-3">
        <label class="form-label">Account Number</label>
        <input type="text" class="form-control" name="account_number" value="{{ emp.account_number or '' }}" inputmode="numeric">
      </div>
      <div class="mb-1">
        <label class="form-label">IFSC Code</label>
        <input type="text" class="form-control" name="ifsc_code" value="{{ emp.ifsc_code or '' }}" maxlength="20">
      </div>
    </div>
  </div>

  <p class="form-section-title"><i class="bi bi-card-text me-2"></i>ID Proofs</p>
  <div class="card">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">PAN Number</label>
        <input type="text" class="form-control" name="pan_number" value="{{ emp.pan_number or '' }}" maxlength="20">
      </div>
      <div class="mb-1">
        <label class="form-label">Aadhar Number</label>
        <input type="text" class="form-control" name="aadhar_number" value="{{ emp.aadhar_number or '' }}" maxlength="20" inputmode="numeric">
      </div>
    </div>
  </div>

  <button type="submit" class="btn btn-touch w-100 mt-3 mb-4" style="background: linear-gradient(135deg, #0A1628, #1565C0); color: white; border: none;">
    <i class="bi bi-check2-circle me-2"></i>Save Changes
  </button>
</form>
{% endblock %}
