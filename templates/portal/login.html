<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0A1628">
  <title>Employee Login — Robo Pirate's Payroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/portal.css') }}" rel="stylesheet">
</head>
<body class="rp-login-body">

  <div class="rp-login-card">
    <h1 class="rp-login-title">Robo Pirate's Payroll</h1>
    <p class="rp-login-sub">Employee Portal</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="rp-login-alert {{ 'danger' if cat == 'danger' else 'success' if cat == 'success' else '' }} mb-3">
          {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="post" autocomplete="on" id="loginForm">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <label class="rp-login-label">Phone Number</label>
      <div class="rp-input-wrap">
        <i class="bi bi-phone rp-input-icon"></i>
        <input type="tel" name="phone" class="rp-login-input" placeholder="Enter your phone number" required autofocus inputmode="tel" autocomplete="username">
      </div>

      <label class="rp-login-label">Password</label>
      <div class="rp-input-wrap">
        <i class="bi bi-lock rp-input-icon"></i>
        <input type="password" name="password" class="rp-login-input" id="passwordInput" placeholder="Enter your password" required autocomplete="current-password">
        <button type="button" class="rp-pw-toggle" id="pwToggle" onclick="togglePassword()" aria-label="Toggle password">
          <i class="bi bi-eye" id="pwToggleIcon"></i>
        </button>
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label" for="remember" style="font-size: 0.85rem; color: rgba(255,255,255,0.55);">Keep me logged in</label>
        </div>
        <a href="{{ url_for('auth.forgot_password') }}" class="rp-login-link">Forgot?</a>
      </div>

      <button type="submit" class="rp-login-btn">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login to Portal
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}" class="rp-login-link">Admin Login</a>
      <span class="mx-2" style="color: rgba(255,255,255,0.3);">|</span>
      <a href="{{ url_for('portal.register') }}" class="rp-login-link">Register</a>
    </div>
  </div>

<script>
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('pwToggleIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
</body>
</html>
