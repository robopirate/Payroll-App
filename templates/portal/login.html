<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Employee Login — Robo Pirate HR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    :root {
      --primary-dark:  #0A1628;
      --primary-blue:  #1565C0;
      --accent-orange: #FF6B35;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      min-height: 100vh;
      background: var(--primary-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, sans-serif;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.06;
    }
    .bg-blob-1 {
      width: 500px; height: 500px;
      background: var(--accent-orange);
      top: -150px; right: -100px;
      animation: blobPulse 8s ease-in-out infinite;
    }
    .bg-blob-2 {
      width: 400px; height: 400px;
      background: var(--primary-blue);
      bottom: -100px; left: -80px;
      animation: blobPulse 10s ease-in-out infinite reverse;
    }
    @keyframes blobPulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.15); }
    }

    .login-card {
      background: white;
      border-radius: 24px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      position: relative;
      z-index: 10;
    }

    /* Orange top accent bar */
    .login-card::before {
      content: '';
      display: block;
      height: 4px;
      background: var(--accent-orange);
      border-radius: 24px 24px 0 0;
      position: absolute;
      top: 0; left: 0; right: 0;
    }

    .logo {
      font-size: 3.2rem;
      text-align: center;
      margin-bottom: 4px;
      animation: floatLogo 4s ease-in-out infinite;
    }
    @keyframes floatLogo {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      color: #0A1628;
      text-align: center;
      margin: 0;
    }
    .brand-sub {
      color: #9aa5b4;
      font-size: 0.82rem;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 20px;
    }
    .portal-badge {
      display: block;
      text-align: center;
      margin: 0 auto 24px;
    }
    .portal-badge span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,107,53,0.08);
      border: 1px solid rgba(255,107,53,0.25);
      color: var(--accent-orange);
      padding: 5px 16px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .field-label {
      font-size: 0.74rem;
      font-weight: 600;
      color: #6b7a99;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
      display: block;
    }

    .input-wrap { position: relative; margin-bottom: 16px; }
    .input-icon {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: #b0bac9;
      font-size: 1.05rem;
      pointer-events: none;
    }
    .form-control {
      border-radius: 12px;
      height: 52px;
      font-size: 1rem;
      border: 1.5px solid #dde3ed;
      padding-left: 44px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      border-color: var(--accent-orange);
      box-shadow: 0 0 0 3px rgba(255,107,53,0.12);
      outline: none;
    }

    .btn-login {
      width: 100%;
      height: 52px;
      background: var(--accent-orange);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      margin-top: 8px;
      transition: filter 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .btn-login:hover {
      filter: brightness(0.9);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255,107,53,0.35);
    }
    .btn-login:active { transform: translateY(0); }

    .admin-link {
      text-align: center;
      margin-top: 20px;
      font-size: 0.84rem;
      color: #9aa5b4;
    }
    .admin-link a {
      color: var(--primary-blue);
      font-weight: 600;
      text-decoration: none;
    }
    .admin-link a:hover { text-decoration: underline; }

    .form-check-label { font-size: 0.88rem; color: #6b7a99; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Background blobs -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>

  <div class="login-card">
    <div class="logo">🤖</div>
    <h1 class="brand-name">Robo Pirate HR</h1>
    <p class="brand-sub">Powering the Humans Behind the Robots</p>
    <div class="portal-badge">
      <span><i class="bi bi-person-badge-fill"></i> Employee Portal</span>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} rounded-3 py-2 px-3 mb-3" style="font-size:0.88rem;border:none;">
          {{ msg }}
        </div>
      {% endfor %}
    {% endwith %}

    <form method="post" autocomplete="on">
      <div class="input-wrap">
        <label class="field-label">Phone Number</label>
        <i class="bi bi-phone input-icon"></i>
        <input type="tel" name="phone" class="form-control"
               placeholder="Enter your phone number"
               required autofocus inputmode="tel" autocomplete="username">
      </div>

      <div class="input-wrap">
        <label class="field-label">Password</label>
        <i class="bi bi-lock input-icon"></i>
        <input type="password" name="password" class="form-control"
               placeholder="Enter your password"
               required autocomplete="current-password">
      </div>

      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" name="remember" id="remember">
          <label class="form-check-label" for="remember">Keep me logged in</label>
        </div>
        <a href="{{ url_for('forgot_password') }}" style="font-size:0.84rem;color:var(--primary-blue);text-decoration:none;font-weight:600;">Forgot password?</a>
      </div>

      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Login to Portal
      </button>
    </form>

    <div class="admin-link">
      Admin? <a href="{{ url_for('login') }}">Admin Dashboard Login →</a>
    </div>

    <hr style="margin: 20px 0; border: none; border-top: 1px solid #dde3ed;">

    <div class="admin-link">
      <span style="display: block; margin-bottom: 10px;">New here? <a href="{{ url_for('register') }}">Register as Employee →</a></span>
    </div>
  </div>
</body>
</html>
