{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-5">
          <h4 class="mb-4 text-center"><i class="bi bi-shield-lock text-success"></i> Set New Password</h4>

          {% if error %}
          <div class="alert alert-danger alert-dismissible fade show" role="alert">
            {{ error }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
          {% endif %}

          <form method="POST">
            <div class="mb-3">
              <label class="form-label">Reset Token <span class="text-danger">*</span></label>
              <input type="text" name="token" class="form-control form-control-lg"
                     placeholder="Enter token from SMS" required autofocus>
              <small class="text-muted">Paste the token you received via SMS</small>
            </div>

            <div class="mb-3">
              <label class="form-label">New Password <span class="text-danger">*</span></label>
              <input type="password" name="new_password" class="form-control form-control-lg"
                     placeholder="Minimum 6 characters" minlength="6" required>
              <small class="text-muted">Must be at least 6 characters</small>
            </div>

            <div class="mb-4">
              <label class="form-label">Confirm Password <span class="text-danger">*</span></label>
              <input type="password" name="confirm_password" class="form-control form-control-lg"
                     placeholder="Re-enter your password" minlength="6" required>
            </div>

            <button type="submit" class="btn btn-success w-100 btn-lg">
              <i class="bi bi-check-lg"></i> Reset Password
            </button>
          </form>

          <div class="mt-4 text-center">
            <p class="text-muted small">Didn't receive a token? <a href="{{ url_for('forgot_password') }}">Request a new one</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
