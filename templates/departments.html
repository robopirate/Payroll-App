{% extends 'base.html' %}
{% block title %}Departments{% endblock %}
{% block content %}
<div class="container-fluid py-4">
  <div class="d-flex align-items-center gap-2 mb-4">
    <a href="{{ url_for('admin.employees') }}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
    <h4 class="page-header mb-0">Departments</h4>
  </div>

  <div class="row g-4">
    <div class="col-lg-4">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom">
          <h6 class="mb-0 fw-bold"><i class="bi bi-plus-circle"></i> Add Department</h6>
        </div>
        <div class="card-body">
          <form method="POST">
            <div class="input-group">
              <input type="text" name="name" class="form-control" placeholder="Department name" required>
              <button type="submit" class="btn btn-primary">Add</button>
            </div>
          </form>
        </div>
      </div>
    </div>
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr><th>Department</th><th>Employees</th></tr>
            </thead>
            <tbody>
              {% for dept in departments %}
              <tr>
                <td class="fw-semibold">{{ dept.name }}</td>
                <td>{{ dept.employees|selectattr('is_active')|list|length }}</td>
              </tr>
              {% else %}
              <tr><td colspan="2" class="text-center text-muted py-4">No departments yet.</td></tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
